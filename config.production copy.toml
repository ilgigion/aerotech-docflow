[application]
environment = "production"
version = "1.0.0-rc2+config-hardening.20260722"
host = "127.0.0.1"
port = 8000

[scanner]
naps2_executable = "C:\\Program Files\\NAPS2\\NAPS2.Console.exe"
profile = "EPSON DS-790WN"
output_encoding = "cp866"
incoming_dir = "D:\\incoming"
timeout_seconds = 180
timeout_kill_grace_seconds = 10
verify_process_exit_seconds = 5
quarantine_failed_outputs = true
failed_scan_dir_name = "_failed_runtime"
min_pdf_size_bytes = 100
min_pdf_pages = 1
stable_checks = 2
stable_interval_seconds = 0.5

[scanner.direct]
driver = "escl"
device_name = "EPSON DS-790WN"
source = "duplex"
dpi = 300
page_size = "a4"
bit_depth = "gray"

[archive]
root = "D:\\Archive"
confirmation = "D:\\Archive"
archive_id = "aerotech-primary-archive"
allowed_doc_types = ["НКЛ", "УПД"]
min_document_year = 2020
max_document_year = 2030

[storage]
copy_buffer_size = 1048576
keep_temp_on_error = false
reservation_stale_seconds = 1800

[locking]
stale_seconds = 1800
wait_timeout_seconds = 0.0
retry_interval_seconds = 0.5
allow_stale_takeover = true

[logging]
enabled = true
level = "INFO"
directory = "C:\\ProgramData\\Aerotech Docflow\\logs"
max_bytes = 52428800
backup_count = 5
retention_months = 12

[idempotency]
enabled = true
directory = "C:\\ProgramData\\Aerotech Docflow\\data\\idempotency"
stale_seconds = 1800

[cleanup]
quarantine_dir_name = "_failed"
managed_prefix = "PF_"
managed_suffix = ".pdf"
min_age_seconds = 86400
skip_if_lock_exists = true
stable_checks = 2
stable_interval_seconds = 0.2
