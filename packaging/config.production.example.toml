# Safe production template distributed with the application.
#
# Before installation, copy/edit the packaged config.production.toml and
# replace every REPLACE_WITH_* value for the target computer. Do not commit the
# resulting machine configuration. Production preflight must pass before the
# service is installed or started.

[application]
environment = "production"
version = "REPLACE_WITH_RELEASE_VERSION"
host = "127.0.0.1"
port = 8000

[scanner]
naps2_executable = "C:\\Program Files\\NAPS2\\NAPS2.Console.exe"
profile = "REPLACE_WITH_NAPS2_PROFILE_NAME"
output_encoding = "cp866"
incoming_dir = "C:\\ProgramData\\Aerotech Docflow\\incoming"
timeout_seconds = 180
timeout_kill_grace_seconds = 10
verify_process_exit_seconds = 5
quarantine_failed_outputs = true
failed_scan_dir_name = "_failed_runtime"
min_pdf_size_bytes = 100
min_pdf_pages = 1
stable_checks = 2
stable_interval_seconds = 0.5

# Used only by internal/manual direct mode when scanner.profile is empty.
[scanner.direct]
driver = "escl"
device_name = "REPLACE_WITH_SCANNER_DEVICE_NAME"
source = "duplex"
dpi = 300
page_size = "a4"
bit_depth = "gray"

[archive]
# Use the real absolute archive root on the target computer. Keep incoming,
# logs and idempotency outside this directory.
root = "D:\\REPLACE_WITH_ARCHIVE_ROOT"
# Must be exactly the same absolute path as archive.root in production.
confirmation = "D:\\REPLACE_WITH_ARCHIVE_ROOT"
# Must match the archive marker created during the controlled installation.
archive_id = "REPLACE_WITH_UNIQUE_ARCHIVE_ID"
allowed_doc_types = ["TYPE_A", "TYPE_B"]
min_document_year = 2020
max_document_year = 2035

[storage]
copy_buffer_size = 1048576
keep_temp_on_error = false
reservation_stale_seconds = 1800

[locking]
stale_seconds = 1800
wait_timeout_seconds = 0.0
retry_interval_seconds = 0.5
allow_stale_takeover = true

[logging]
enabled = true
level = "INFO"
directory = "C:\\ProgramData\\Aerotech Docflow\\logs"
max_bytes = 52428800
backup_count = 5
retention_months = 12

[idempotency]
enabled = true
directory = "C:\\ProgramData\\Aerotech Docflow\\data\\idempotency"
stale_seconds = 1800

[cleanup]
quarantine_dir_name = "_failed"
managed_prefix = "PF_"
managed_suffix = ".pdf"
min_age_seconds = 86400
skip_if_lock_exists = true
stable_checks = 2
stable_interval_seconds = 0.2
